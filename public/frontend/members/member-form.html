<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member-Form</title>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div id="mainNavbar"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="mainSidebar" class="col-2 px-0"></div>
            <!-- Main Content -->
            <div class="col-10 p-4">
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">Member Form</h5>
                            </div>
                            <div class="card-body">
                                <form id="memberForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Gym</label>
                                            <select class="form-select" id="gyms" >
                                                <option value="" selected disabled>Select Gym</option>
                                            </select>
                                            <div class="invalid-feedback" id="gymError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Plan</label>
                                            <select class="form-select" id="plan_id" >
                                                <option value="" selected disabled>Select Plan</option>
                                            </select>
                                            <div class="invalid-feedback" id="planError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Name</label>
                                            <input type="text" class="form-control" id="name" placeholder="Enter name"  maxlength="30">
                                            <div class="invalid-feedback" id="nameError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Phone</label>
                                            <input type="tel" class="form-control" id="phone"
                                                placeholder="Enter phone number"  maxlength="10">
                                                <div class="invalid-feedback" id="phoneError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                             <label class="form-label">Joining Date</label>
                                             <input type="date" class="form-control" id="joiningDate" >
                                             <div class="invalid-feedback" id="joiningDateError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Address</label>
                                            <textarea class="form-control" id="address" rows="3"
                                                placeholder="Enter address"   maxlength="255"></textarea>
                                                <div class="invalid-feedback" id="addressError"></div>
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-end">
                                        <button type="submit" class="btn btn-primary" id="saveBtn"></button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="../assets/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
        <script src="../js/dashboard.js"></script>
        <script type="module" src="member-form.js"></script>
</body>

</html>
