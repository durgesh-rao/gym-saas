<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym-Form</title>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div id="mainNavbar"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="mainSidebar" class="col-2 px-0"></div>
            <!-- Main Content -->
            <div class="col-10 p-4">
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">Gym Form</h5>
                            </div>
                            <div class="card-body">
                                <form id="gymForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Name</label>
                                            <input type="text" class="form-control" id="name" placeholder="Enter gym name">
                                             <div class="invalid-feedback" id="nameError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Address</label>
                                            <textarea class="form-control" id="address" rows="3"
                                                placeholder="Enter gym address"></textarea>
                                                <div class="invalid-feedback" id="addressError"></div>
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-end">
                                        <button type="submit" class="btn btn-primary" id="saveBtn"></button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="../assets/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
        <script src="../js/dashboard.js"></script>

        <script type="module" src="gym-form.js"></script>
</body>

</html>
