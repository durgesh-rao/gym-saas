<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div id="mainNavbar"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="mainSidebar" class="col-2 px-0"></div>
            <!-- Main Content -->
            <div class="col-10 p-4">
                <div class="row mb-4 align-items-center">
                    <h4>Plans<i class="bi bi-chevron-double-right"></i></h4>
                </div>
                <div class="row mb-3 align-items-center">
                    <div class="col-md-6">
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control" id="planSearchInput" placeholder="Search Plans">
                            <select class="form-select" style="max-width:150px;">
                                <option>All</option>
                                <option>Active</option>
                                <option>Expired</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <button id="addPlanBtn" class="btn btn-primary me-2"><i class="bi bi-plus-lg"></i> Add</button>
                        <button class="btn btn-success me-4">Export</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow border-0">
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle caption-top">
                                        <caption>List of Plans</caption>
                                        <thead class="table-light">
                                            <tr>
                                                <th>ID</th>
                                                <th>Gym</th>
                                                <th>Plan</th>
                                                <th>duration</th>
                                                <th>price</th>
                                                <th>Status</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>

                                        <tbody id="planTable">
                                        </tbody>
                                    </table>
                                </div>
                                <div id="pagination"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/main.js"></script>
    <script src="../js/dashboard.js"></script>

    <script type="module" src="plan.js"></script>
</body>

</html>
