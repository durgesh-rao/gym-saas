<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan-Form</title>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div id="mainNavbar"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="mainSidebar" class="col-2 px-0"></div>
            <!-- Main Content -->
            <div class="col-10 p-4">
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">Plan Form</h5>
                            </div>
                            <div class="card-body">
                                <form id="planForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Gym</label>
                                            <select class="form-select" id="gyms">
                                                <option value="" selected disabled>Select Gym</option>
                                            </select>
                                            <div class="invalid-feedback" id="gymError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Plan Type</label>
                                            <input type="text" class="form-control" id="planType" placeholder="e.g. Monthly, Quarterly, Yearly">
                                            <div class="invalid-feedback" id="planTypeError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Duration (Days)</label>
                                            <input type="number" class="form-control" id="duration"
                                                placeholder="e.g. 30, 90, 365">
                                                <div class="invalid-feedback" id="durationError"></div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Price</label>
                                            <div class="input-group">
                                                <span class="input-group-text">₹</span>
                                                <input type="number" class="form-control" id="price" step="0.01">
                                                <div class="invalid-feedback" id="priceError"></div>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Description</label>
                                            <textarea class="form-control" id="description" rows="3"
                                                placeholder="Enter plan details (optional)"></textarea>
                                                <div class="invalid-feedback" id="descriptionError"></div>
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-end">
                                        <button type="submit" class="btn btn-primary" id="saveBtn"></button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="../assets/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
        <script src="../js/dashboard.js"></script>
        <script type="module" src="plan-form.js"></script>
</body>

</html>
