<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-Form</title>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div id="mainNavbar"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="mainSidebar" class="col-2 px-0"></div>
            <!-- Main Content -->
            <div class="col-10 p-4">
                <div class="row">
                    <div class="col-6">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">User Form</h5>
                            </div>
                            <div class="card-body">
                                <form id="userForm">
                                    <div class="row">
                                        <div class="col-md-12 mb-3">
                                            <label class="form-label">Role</label>
                                            <select class="form-select" id="role" name="role">
                                                <option value="" selected disabled></option>
                                                <option value="admin">Admin</option>
                                                <option value="owner">Owner</option>
                                            </select>
                                            <div class="invalid-feedback" id="roleError"></div>
                                        </div>
                                        <div class="col-md-12 mb-3">
                                            <label class="form-label">Name</label>
                                            <input type="text" class="form-control" id="name" placeholder="Enter user name">
                                             <div class="invalid-feedback" id="nameError"></div>
                                        </div>
                                        <div class="col-md-12 mb-3">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="email" placeholder="Enter email address">
                                                <div class="invalid-feedback" id="emailError"></div>
                                        </div>
                                        <div class="col-md-12 mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="password" placeholder="Enter Password">
                                                <div class="invalid-feedback" id="passwordError"></div>
                                        </div>
                                        <div class="col-md-12 mb-3">
                                            <label class="form-label">Confirm Password</label>
                                            <input type="password" class="form-control" id="password_confirmation" placeholder="Confirm Password">
                                            <div class="invalid-feedback" id="passwordConfirmationError"></div>
                                        </div>
                                    </div>
                                    <div class="d-flex justify-content-end">
                                        <button type="submit" class="btn btn-primary" id="saveBtn"></button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="../assets/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
        <script src="../js/dashboard.js"></script>

        <script type="module" src="user-form.js"></script>
</body>

</html>
